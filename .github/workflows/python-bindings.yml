name: Python bindings

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: universal2-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: bindings/python
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  test:
    name: Tests + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create venv at repo root
        run: |
          # Repo root, not bindings/python — avoids mypy walking into
          # .venv/ when running `mypy --strict .` from bindings/python.
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
      - name: Install test deps
        run: pip install 'maturin>=1.7,<2.0' pytest hypothesis 'mypy>=1.8'
      - name: Install into venv
        working-directory: bindings/python
        run: maturin develop --release
      - name: Run pytest
        working-directory: bindings/python
        run: python -m pytest tests/ -v
      - name: Run mypy --strict
        working-directory: bindings/python
        run: python -m mypy --strict .

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install 'maturin>=1.7,<2.0'
      - name: Build sdist
        working-directory: bindings/python
        run: maturin sdist --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist/*.tar.gz
          if-no-files-found: error

  # Publishes wheels + sdist to PyPI on tag push (refs/tags/v*) or
  # manual workflow_dispatch. Skipped on regular branch pushes / PRs.
  #
  # Auth: PyPI Trusted Publishing via OIDC. Requires a "pending publisher"
  # configured at https://pypi.org/manage/account/publishing/ before the
  # first publish (project name: marlin-py, owner: jkr78, repo: marlin,
  # workflow: python-bindings.yml). After the first publish, the entry
  # graduates from "pending" to a regular trusted publisher.
  #
  # Path B fallback (if you prefer a long-lived API token over OIDC):
  #   1. Drop `permissions: id-token: write`
  #   2. Add to the publish step:
  #        with:
  #          password: ${{ secrets.PYPI_API_TOKEN }}
  #   3. Store the token at https://github.com/jkr78/marlin/settings/secrets/actions
  publish:
    name: Publish to PyPI
    needs: [build, test, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
