name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: fmt check
        run: just fmt-check

      - name: build
        run: just build

      - name: test
        run: just test

      - name: lint
        run: just lint

      - name: doc
        run: just doc

      # The fuzz crate is excluded from the Cargo workspace, so the steps
      # above (--workspace/--all) never cover it. Its harnesses check + lint
      # on stable — nightly is only needed to run the fuzzer itself.
      - name: fuzz fmt check
        run: just fuzz-fmt-check

      - name: fuzz lint
        run: just fuzz-lint

  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets

  fuzz-smoke:
    name: Fuzz smoke (nightly, 30s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Install cargo-fuzz
        # Resolve cargo-fuzz's transitive deps fresh instead of using its
        # bundled Cargo.lock. The lockfile pins rustix 0.36 (June 2025)
        # which breaks on newer nightly rustc — fresh resolution picks a
        # newer rustix that compiles. CI fuzz-smoke is not a reproducible
        # release artifact so install-time drift is acceptable.
        run: cargo install cargo-fuzz
      - name: Run envelope fuzz target for 30s
        run: just fuzz envelope 30
