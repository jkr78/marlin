name: Python bindings

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: universal2-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: bindings/python
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  test:
    name: Tests + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create venv at repo root
        run: |
          # Repo root, not bindings/python — avoids mypy walking into
          # .venv/ when running `mypy --strict .` from bindings/python.
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
      - name: Install test deps
        run: pip install 'maturin>=1.7,<2.0' pytest hypothesis 'mypy>=1.8'
      - name: Install into venv
        working-directory: bindings/python
        run: maturin develop --release
      - name: Run pytest
        working-directory: bindings/python
        run: python -m pytest tests/ -v
      - name: Run mypy --strict
        working-directory: bindings/python
        run: python -m mypy --strict .

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install 'maturin>=1.7,<2.0'
      - name: Build sdist
        working-directory: bindings/python
        run: maturin sdist --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python/dist/*.tar.gz
          if-no-files-found: error
